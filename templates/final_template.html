<script>
(function() {
    'use strict';
    // ============================================================
    // MODULAR FINAL OVERLAY ENGINE v4.2 — BUGFIX ROUND 2
    // ============================================================
    // Correcciones de esta versión:
    // 1. showLayer() usa awaitTransitionEnd() real
    // 2. Poll loop usa IntervalEngine (no setTimeout directo)
    // 3. createAbortableFetch() separa cleanup de abort
    // 4. Cache restore usa set(key, value, ttl) correcto
    // 5. RAFScheduler.remove() detiene RAF inmediato si vacío
    // 6. FreezeDetection con cooldown anti-loop
    // 7. EngineRegistry valida duplicados
    // 8. emitAsync() respeta priorities
    // 9. Poll loop con sequence lock
    // 10. FrameBudgetEngine (task chunking + idle callbacks)
    // 11. RenderDiffEngine (partial DOM updates)
    // 12. DeclarativeSequenceGraph (timeline engine preparado)
    // ============================================================

    // ============================================================
    // 1. CONFIG
    // ============================================================
    const rawEventName = '__EVENT_NAME__';
    const sanitizeEventName = (name) => {
        return name.trim()
            .replace(/[<>:"/\\|?*]+/g, '')
            .replace(/\s+/g, '_');
    };
    const SAFE_EVENT_NAME = sanitizeEventName(rawEventName);
    window.EVENT_NAME = rawEventName;
    window.SAFE_EVENT_NAME = SAFE_EVENT_NAME;

    window.API_BASE = window.API_BASE || "https://v2-api-production-db45.up.railway.app";
    const SNAPSHOT_ENDPOINT = `${window.API_BASE}/getmatchsnapshot`;
    const DEFAULT_LOGO = '/shared/assets/default_logo.png';

    const WEAPON_NAMES = {
        101001: 'AKM', 101002: 'M16A4', 101003: 'SCAR-L', 101004: 'M416', 101005: 'Groza', 101006: 'AUG A3',
        101007: 'QBZ', 101008: 'M762', 101009: 'Mk47 Mutant', 101010: 'G36C', 101100: 'FAMAS', 101012: 'Honey Badger',
        102001: 'UZI', 102002: 'UMP45', 102003: 'Vector', 102004: 'Thompson SMG', 102005: 'PP19', 102007: 'MP5K',
        102105: 'P90', 103001: 'Kar98K', 103002: 'M24', 103003: 'AWM', 103004: 'SKS', 103005: 'VSS', 103006: 'Mini14',
        103007: 'Mk14', 103008: 'Win94', 103009: 'SLR', 103010: 'QBU', 103011: 'Mosin Nagant', 103012: 'AMR',
        103100: 'MK12', 104001: 'S686', 104002: 'S1897', 104003: 'S12K', 104004: 'DBS', 104101: 'M1014',
        104102: 'NS2000', 105001: 'M249', 105002: 'DP-28', 105010: 'MG3', 106001: 'P92', 106002: 'P1911',
        106003: 'R1895', 106004: 'P18C', 106005: 'R45', 106006: 'Sawed-off', 106007: 'Flare gun', 106008: 'Skorpion',
        106010: 'Desert Eagle', 107001: 'Crossbow', 107007: 'Tactical Crossbow'
    };

    const SEQUENCE_CONFIG = {
        winnerDuration: 20000,
        mvpDuration: 20000,
        mvtDuration: 20000,
        classificationDuration: 30000,
        classificationAutoHide: 30000,
        winnerStabilizationDelay: 2500,
        winnerStabilizationRetries: 5
    };

    // ============================================================
    // 2. SAFE DOM ENGINE
    // ============================================================
    function safeGetElement(id) {
        const el = document.getElementById(id);
        if (!el && typeof DebugEngine !== 'undefined') DebugEngine.warn('DOM', `Missing element: ${id}`);
        return el;
    }
    function safeSetText(id, value) {
        const el = safeGetElement(id);
        if (el) el.textContent = value;
        return el;
    }
    function safeSetHtml(id, html) {
        const el = safeGetElement(id);
        if (el) el.innerHTML = html;
        return el;
    }
    function safeSetOpacity(id, value) {
        const el = safeGetElement(id);
        if (el) el.style.opacity = value;
        return el;
    }
    function safeSetDisplay(id, value) {
        const el = safeGetElement(id);
        if (el) el.style.display = value;
        return el;
    }
    function safeSetSrc(id, value) {
        const el = safeGetElement(id);
        if (el) el.src = value;
        return el;
    }
    function safeAddClass(id, className) {
        const el = safeGetElement(id);
        if (el) el.classList.add(className);
        return el;
    }
    function safeRemoveClass(id, className) {
        const el = safeGetElement(id);
        if (el) el.classList.remove(className);
        return el;
    }

    // ============================================================
    // 3. DEBUG ENGINE
    // ============================================================
    const DebugEngine = {
        categories: {
            NETWORK: true, RENDER: true, SEQUENCE: true, WATCHDOG: true,
            CACHE: true, PERF: false, DOM: false, HEALTH: true,
            TRANSITION: true, RAF: false, CLEANUP: true, METRICS: false,
            FREEZE: true, OBS: true, COMMAND: true, SNAPSHOT: true,
            BUDGET: false, DIFF: false
        },
        log(cat, ...args) {
            if (!overlayState.isDebugMode) return;
            if (this.categories[cat] === false) return;
            console.log(`[${cat}]`, ...args);
        },
        warn(cat, ...args) {
            if (!overlayState.isDebugMode) return;
            console.warn(`[${cat}]`, ...args);
        },
        error(cat, ...args) {
            if (!overlayState.isDebugMode) return;
            console.error(`[${cat}]`, ...args);
        }
    };

    // ============================================================
    // 4. INTERNAL EVENT BUS (v3: emitAsync respeta priorities)
    // ============================================================
    const InternalEventBus = {
        listeners: new Map(),
        wildcardListeners: [],
        on(event, fn, options = {}) {
            const { priority = 0, namespace = null } = options;
            const entry = { fn, priority, namespace, once: false };
            if (event === '*') {
                this.wildcardListeners.push(entry);
                this.wildcardListeners.sort((a, b) => b.priority - a.priority);
            } else {
                if (!this.listeners.has(event)) this.listeners.set(event, []);
                this.listeners.get(event).push(entry);
                this.listeners.get(event).sort((a, b) => b.priority - a.priority);
            }
        },
        once(event, fn, options = {}) {
            const entry = { fn, priority: options.priority || 0, namespace: options.namespace || null, once: true };
            if (event === '*') {
                this.wildcardListeners.push(entry);
                this.wildcardListeners.sort((a, b) => b.priority - a.priority);
            } else {
                if (!this.listeners.has(event)) this.listeners.set(event, []);
                this.listeners.get(event).push(entry);
                this.listeners.get(event).sort((a, b) => b.priority - a.priority);
            }
        },
        off(event, fn) {
            if (event === '*') {
                this.wildcardListeners = this.wildcardListeners.filter(e => e.fn !== fn);
            } else if (this.listeners.has(event)) {
                const arr = this.listeners.get(event).filter(e => e.fn !== fn);
                this.listeners.set(event, arr);
            }
        },
        offNamespace(namespace) {
            this.wildcardListeners = this.wildcardListeners.filter(e => e.namespace !== namespace);
            this.listeners.forEach((arr, event) => {
                this.listeners.set(event, arr.filter(e => e.namespace !== namespace));
            });
        },
        emit(event, data) {
            const execute = (entry) => {
                try {
                    entry.fn(data, event);
                    if (entry.once) return false;
                    return true;
                } catch(e) {
                    DebugEngine.error('BUS', `Event ${event} handler error:`, e);
                    return entry.once ? false : true;
                }
            };
            if (this.listeners.has(event)) {
                const arr = this.listeners.get(event);
                const survivors = [];
                for (let entry of arr) { if (execute(entry)) survivors.push(entry); }
                if (survivors.length !== arr.length) this.listeners.set(event, survivors);
            }
            const wildSurvivors = [];
            for (let entry of this.wildcardListeners) { if (execute(entry)) wildSurvivors.push(entry); }
            if (wildSurvivors.length !== this.wildcardListeners.length) {
                this.wildcardListeners = wildSurvivors;
            }
        },
        async emitAsync(event, data) {
            const allEntries = [];
            if (this.listeners.has(event)) allEntries.push(...this.listeners.get(event));
            allEntries.push(...this.wildcardListeners);
            allEntries.sort((a, b) => b.priority - a.priority);
            const promises = [];
            for (let entry of allEntries) {
                promises.push(Promise.resolve().then(() => entry.fn(data, event)).catch(e => {
                    DebugEngine.error('BUS', `Async event ${event} handler error:`, e);
                }));
            }
            await Promise.all(promises);
        }
    };

    // ============================================================
    // 5. ASYNC TASK REGISTRY
    // ============================================================
    const AsyncTaskRegistry = {
        tasks: new Map(),
        nextId: 1,
        register(cancelFn, metadata = {}) {
            const id = this.nextId++;
            const task = {
                id,
                cancel: cancelFn,
                active: true,
                state: 'pending',
                createdAt: Date.now(),
                metadata: { type: metadata.type || 'generic', label: metadata.label || '', ...metadata }
            };
            this.tasks.set(id, task);
            return id;
        },
        resolve(id) {
            const task = this.tasks.get(id);
            if (task) { task.state = 'fulfilled'; task.active = false; }
        },
        reject(id) {
            const task = this.tasks.get(id);
            if (task) { task.state = 'rejected'; task.active = false; }
        },
        complete(id) { this.resolve(id); },
        cancel(id) {
            const task = this.tasks.get(id);
            if (task && task.active) {
                task.active = false;
                task.state = 'cancelled';
                try { task.cancel(); } catch(e) {}
            }
            this.tasks.delete(id);
        },
        cancelAll() {
            this.tasks.forEach((task) => {
                if (task.active) {
                    task.active = false;
                    task.state = 'cancelled';
                    try { task.cancel(); } catch(e) {}
                }
            });
            this.tasks.clear();
        },
        count() { return this.tasks.size; },
        getPending() { return Array.from(this.tasks.values()).filter(t => t.state === 'pending'); },
        getStats() {
            const all = Array.from(this.tasks.values());
            return {
                total: all.length,
                pending: all.filter(t => t.state === 'pending').length,
                fulfilled: all.filter(t => t.state === 'fulfilled').length,
                rejected: all.filter(t => t.state === 'rejected').length,
                cancelled: all.filter(t => t.state === 'cancelled').length
            };
        }
    };

    // ============================================================
    // 6. RAF SCHEDULER (v3: remove detiene inmediato si vacío)
    // ============================================================
    const RAFScheduler = {
        animations: new Map(),
        nextId: 1,
        rafId: null,
        active: false,
        add(fn) {
            const id = this.nextId++;
            this.animations.set(id, fn);
            if (!this.active) this.start();
            return id;
        },
        remove(id) {
            this.animations.delete(id);
            if (this.animations.size === 0) {
                this.stop();
            }
        },
        start() {
            if (this.active) return;
            this.active = true;
            const loop = (now) => {
                if (!this.active) return;
                this.animations.forEach((fn, id) => {
                    try {
                        const done = fn(now);
                        if (done) this.animations.delete(id);
                    } catch(e) { this.animations.delete(id); DebugEngine.error('RAF', e); }
                });
                if (this.animations.size) {
                    this.rafId = requestAnimationFrame(loop);
                } else {
                    this.active = false;
                    this.rafId = null;
                }
            };
            this.rafId = requestAnimationFrame(loop);
        },
        stop() {
            this.active = false;
            if (this.rafId) {
                cancelAnimationFrame(this.rafId);
                this.rafId = null;
            }
        },
        clear() {
            this.animations.clear();
            this.stop();
        }
    };

        canvasContexts: new Map(),

        timeoutGeneration: 0,
        lastGameId: null,
        fetchInProgress: false,
        fetchStartTime: 0,
        pollingActive: true,

    // ============================================================
    // 8. TIMEOUT ENGINE + INTERVAL ENGINE
    // ============================================================
    function clearAllTimeouts() {
        overlayState.timeoutGeneration++;
        for (let id of overlayState.activeTimeouts) clearTimeout(id);
        overlayState.activeTimeouts = [];
    }

    function addTimeout(fn, delay) {
        const gen = overlayState.timeoutGeneration;
        const id = setTimeout(() => {
            if (gen !== overlayState.timeoutGeneration) return;
            try { fn(); } catch (e) { DebugEngine.error('TIMEOUT', 'Timeout callback error:', e); }
            const idx = overlayState.activeTimeouts.indexOf(id);
            if (idx !== -1) overlayState.activeTimeouts.splice(idx, 1);
        }, delay);
        overlayState.activeTimeouts.push(id);
        return id;
    }

    function removeTimeout(id) {
        clearTimeout(id);
        const idx = overlayState.activeTimeouts.indexOf(id);
        if (idx !== -1) overlayState.activeTimeouts.splice(idx, 1);
    }

    function delay(ms) {
        return new Promise(resolve => { addTimeout(resolve, ms); });
    }

    const IntervalEngine = {
        intervals: new Map(),
        nextId: 1,
        set(fn, ms, options = {}) {
            const id = this.nextId++;
            const { immediate = false } = options;
            let active = true;
            let timerId = null;
            const run = () => {
                if (!active) return;
                try { fn(); } catch(e) { DebugEngine.error('INTERVAL', 'Interval callback error:', e); }
                timerId = addTimeout(run, ms);
            };
            if (immediate) run();
            else timerId = addTimeout(run, ms);
            this.intervals.set(id, { cancel: () => { active = false; if (timerId) removeTimeout(timerId); } });
            return id;
        },
        clear(id) {
            const entry = this.intervals.get(id);
            if (entry) { entry.cancel(); this.intervals.delete(id); }
        },
        clearAll() {
            this.intervals.forEach(entry => entry.cancel());
            this.intervals.clear();
        }
    };

    // ============================================================
    // 9. CACHE ENGINE (v3: restore usa set correcto)
    // ============================================================
    const CacheManager = {
        create({ maxSize = 50, defaultTTL = 300000, name = 'cache' } = {}) {
            const cache = new Map();
            return {
                name,
                get(key) {
                    const entry = cache.get(key);
                    if (!entry) return undefined;
                    if (Date.now() > entry.expiry) {
                        cache.delete(key);
                        DebugEngine.log('CACHE', `[${name}] Expired key removed:`, key);
                        return undefined;
                    }
                    cache.delete(key);
                    cache.set(key, entry);
                    return entry.value;
                },
                set(key, value, ttl = defaultTTL) {
                    if (cache.has(key)) cache.delete(key);
                    else if (cache.size >= maxSize) {
                        const firstKey = cache.keys().next().value;
                        cache.delete(firstKey);
                        DebugEngine.log('CACHE', `[${name}] LRU prune, removed:`, firstKey);
                    }
                    cache.set(key, { value, expiry: Date.now() + ttl });
                },
                has(key) {
                    const entry = cache.get(key);
                    if (!entry) return false;
                    if (Date.now() > entry.expiry) { cache.delete(key); return false; }
                    return true;
                },
                delete(key) { cache.delete(key); },
                clear() { cache.clear(); },
                size() { return cache.size; },
                prune() {
                    const now = Date.now();
                    let removed = 0;
                    cache.forEach((entry, key) => { if (now > entry.expiry) { cache.delete(key); removed++; } });
                    if (removed) DebugEngine.log('CACHE', `[${name}] Pruned ${removed} expired entries`);
                },
                snapshot() {
                    const snap = {};
                    cache.forEach((entry, key) => { if (Date.now() <= entry.expiry) snap[key] = entry.value; });
                    return snap;
                },
                restore(snap) {
                    cache.clear();
                    Object.entries(snap).forEach(([key, value]) => {
                        this.set(key, value, defaultTTL);
                    });
                }
            };
        }
    };

    overlayState.logoLoadedCache = CacheManager.create({ maxSize: 100, defaultTTL: 600000, name: 'logo' });
    overlayState.weaponDataCache = CacheManager.create({ maxSize: 10, defaultTTL: 300000, name: 'weapon' });
    overlayState.canvasContexts = new Map();

    // ============================================================
    // 10. PRELOAD ENGINE
    // ============================================================
    const PreloadEngine = {
        cache: CacheManager.create({ maxSize: 200, defaultTTL: 300000, name: 'preload' }),
        preloadImage(url) {
            if (!url) return Promise.resolve();
            const cached = this.cache.get(url);
            if (cached !== undefined) return Promise.resolve();
            return new Promise((resolve) => {
                const img = new Image();
                const cleanup = () => { img.onload = null; img.onerror = null; };
                img.onload = () => { this.cache.set(url, true); cleanup(); resolve(); };
                img.onerror = () => { this.cache.set(url, false); cleanup(); resolve(); };
                img.src = url;
            });
        },
        preloadLogo(teamId) {
            const numericTeamId = Number(teamId);
            const teamKey =
                (!isNaN(numericTeamId)
                    ? overlayState.teamIdToKeyMap.get(numericTeamId) || overlayState.teamIdToKeyMap.get(String(numericTeamId))
                    : null) ||
                overlayState.teamIdToKeyMap.get(String(teamId)) ||
                `T-${String(!isNaN(numericTeamId) ? numericTeamId : teamId).padStart(4, '0')}`;
            const url = `/logos/${teamKey}.png`;
            return this.preloadImage(url);
        },
        preloadBatch(urls) {
            return Promise.all(urls.map(u => this.preloadImage(u)));
        }
    };

    // ============================================================
    // 11. PERFORMANCE ENGINE
    // ============================================================
    const PerfEngine = {
        marks: new Map(),
        log(category, label, duration) {
            if (!overlayState.isDebugMode) return;
            if (overlayState.debugCategories && overlayState.debugCategories[category] === false) return;
            DebugEngine.log('PERF', `[${category}] ${label}: ${duration.toFixed(2)}ms`);
        },
        start(label) {
            if (!overlayState.isDebugMode) return null;
            const mark = performance.now();
            this.marks.set(label, mark);
            return mark;
        },
        end(label, category = 'GENERAL') {
            if (!overlayState.isDebugMode) return;
            const start = this.marks.get(label);
            if (!start) return;
            const duration = performance.now() - start;
            this.marks.delete(label);
            this.log(category, label, duration);
            return duration;
        }
    };

    // ============================================================
    // 12. STATE SNAPSHOT ENGINE
    // ============================================================
    const StateSnapshotEngine = {
        serializeState() {
            return JSON.stringify({
                currentLayer: overlayState.currentLayer,
                sequenceActive: overlayState.sequenceActive,
                isMatchFinished: overlayState.isMatchFinished,
                currentGameId: overlayState.currentGameId,
                lastPlayerStats: overlayState.lastPlayerStats,
                teamMaps: {
                    idToKey: Array.from(overlayState.teamIdToKeyMap.entries()),
                    idToName: Array.from(overlayState.teamIdToNameMap.entries())
                },
                eventConfig: overlayState.eventConfig,
                lastGameId: overlayState.lastGameId,
                caches: {
                    logo: overlayState.logoLoadedCache?.snapshot?.() || {},
                    weapon: overlayState.weaponDataCache?.snapshot?.() || {}
                },
                timestamp: Date.now()
            });
        },
        restoreState(snapshot) {
            try {
                const data = typeof snapshot === 'string' ? JSON.parse(snapshot) : snapshot;
                overlayState.currentLayer = data.currentLayer;
                overlayState.sequenceActive = data.sequenceActive;
                overlayState.isMatchFinished = data.isMatchFinished;
                overlayState.currentGameId = data.currentGameId;
                overlayState.lastPlayerStats = data.lastPlayerStats || [];
                overlayState.lastGameId = data.lastGameId || null;
                if (data.teamMaps) {
                    overlayState.teamIdToKeyMap = new Map(data.teamMaps.idToKey);
                    overlayState.teamIdToNameMap = new Map(data.teamMaps.idToName);
                }
                overlayState.eventConfig = data.eventConfig;
                if (data.caches) {
                    if (overlayState.logoLoadedCache && data.caches.logo) overlayState.logoLoadedCache.restore(data.caches.logo);
                    if (overlayState.weaponDataCache && data.caches.weapon) overlayState.weaponDataCache.restore(data.caches.weapon);
                }
                DebugEngine.log('SNAPSHOT', 'State restored from snapshot');
                InternalEventBus.emit('snapshot:restored', data);
                return true;
            } catch(e) {
                DebugEngine.error('SNAPSHOT', 'Restore failed:', e);
                return false;
            }
        },
        exportSnapshot() { return this.serializeState(); },
        restore(snapshot) { return this.restoreState(snapshot); }
    };

    // ============================================================
    // 13. EVENT MIDDLEWARE SYSTEM
    // ============================================================
    const EventMiddlewareSystem = {
        beforeHooks: new Map(),
        afterHooks: new Map(),
        throttleMap: new Map(),
        registerBefore(cmd, fn) {
            if (!this.beforeHooks.has(cmd)) this.beforeHooks.set(cmd, []);
            this.beforeHooks.get(cmd).push(fn);
        },
        registerAfter(cmd, fn) {
            if (!this.afterHooks.has(cmd)) this.afterHooks.set(cmd, []);
            this.afterHooks.get(cmd).push(fn);
        },
        registerThrottle(cmd, ms) {
            this.throttleMap.set(cmd, ms);
        },
        async execute(cmd, originalHandler) {
            const throttleMs = this.throttleMap.get(cmd);
            if (throttleMs) {
                const key = `throttle_${cmd}`;
                const now = Date.now();
                if (overlayState[key] && (now - overlayState[key]) < throttleMs) {
                    DebugEngine.log('COMMAND', `Command ${cmd} throttled`);
                    return;
                }
                overlayState[key] = now;
            }
            const befores = this.beforeHooks.get(cmd) || [];
            for (let hook of befores) {
                const result = await Promise.resolve(hook(cmd));
                if (result === false) { DebugEngine.log('COMMAND', `Command ${cmd} blocked by before-hook`); return; }
            }
            let result;
            try {
                result = await Promise.resolve(originalHandler());
            } catch(e) {
                DebugEngine.error('COMMAND', `Command ${cmd} execution error:`, e);
                throw e;
            }
            const afters = this.afterHooks.get(cmd) || [];
            for (let hook of afters) {
                try { await Promise.resolve(hook(cmd, result)); } catch(e) { DebugEngine.error('COMMAND', `After-hook error for ${cmd}:`, e); }
            }
            InternalEventBus.emit('command:executed', { cmd, result });
            return result;
        }
    };

    // ============================================================
    // 14. RESOURCE METRICS (v3: usa IntervalEngine)
    // ============================================================
    const ResourceMetrics = {
        intervalId: null,
        start() {
            if (this.intervalId) return;
            this.intervalId = IntervalEngine.set(() => {
                if (!overlayState.isDebugMode) return;
                const metrics = {

                    memoryMB: performance.memory ? (performance.memory.usedJSHeapSize / 1048576).toFixed(1) : 'N/A'
                };
                DebugEngine.log('METRICS', 'Runtime metrics:', metrics);
            }, 10000);
        },
        stop() {

        }
    };

    // ============================================================
    // 15. FREEZE DETECTION (v3: cooldown anti-loop)
    // ============================================================
    const FreezeDetection = {
        lastFrameTime: 0,
        threshold: 5000,
        rafId: null,
        active: false,
        recoveryCooldown: 10000,
        lastRecoveryTime: 0,
        start() {
            if (this.active) return;
            this.active = true;
            const checkLoop = () => {
                if (!this.active) return;
                if (document.hidden) {
                    this.lastFrameTime = performance.now();
                    this.rafId = requestAnimationFrame(checkLoop);
                    return;
                }
                const now = performance.now();
                if (this.lastFrameTime && (now - this.lastFrameTime > this.threshold)) {
                    const sinceLastRecovery = now - this.lastRecoveryTime;
                    if (sinceLastRecovery > this.recoveryCooldown) {
                        this.lastRecoveryTime = now;
                        DebugEngine.error('FREEZE', `Freeze detected! ${(now - this.lastFrameTime).toFixed(0)}ms since last frame`);
                        InternalEventBus.emit('freeze:detected', { duration: now - this.lastFrameTime });
                        OBSRecovery.forceRepaint();
                    } else {
                        DebugEngine.log('FREEZE', `Freeze detected but recovery on cooldown (${sinceLastRecovery.toFixed(0)}ms)`);
                    }
                }
                this.lastFrameTime = now;
                this.rafId = requestAnimationFrame(checkLoop);
            };
            this.rafId = requestAnimationFrame(checkLoop);
        },
        stop() {
            this.active = false;
            if (this.rafId) {
                cancelAnimationFrame(this.rafId);
                this.rafId = null;
            }
        }
    };

    // ============================================================
    // 16. OBS RECOVERY ADVANCED (v3: granular repaint)
    // ============================================================
    const OBSRecovery = {
        init() {
            document.addEventListener('visibilitychange', () => {
                if (document.hidden) { this.onHide(); } else { this.onShow(); }
            });
            window.addEventListener('resize', () => { this.forceCanvasRefresh(); });
        },
        onHide() {
            overlayState.pollingActive = false;
            cancelAllAnimations();
            const video = document.getElementById('alertsVideo');
            if (video) video.pause();
            DebugEngine.log('OBS', 'Tab hidden — polling paused, animations cancelled, video paused');
        },
        onShow() {
            overlayState.pollingActive = true;
            const video = document.getElementById('alertsVideo');
            if (video) video.play().catch(()=>{});
            this.forceCanvasRefresh();
            this.forceRepaint();
            if (!overlayState.isDebugMode && !overlayState.pollTimerId) {
                restartPolling();
            }
            DebugEngine.log('OBS', 'Tab visible — polling resumed, repaint forced, video resumed');
        },
        forceCanvasRefresh() {
            overlayState.canvasContexts.clear();
            ['mvpRadarCanvas', 'mvtRadarCanvas'].forEach(id => {
                const canvas = document.getElementById(id);
                if (!canvas) return;
                const w = canvas.width, h = canvas.height;
                canvas.width = 0; canvas.width = w;
                canvas.height = 0; canvas.height = h;
            });
            RadarCache.clear();
        },
        forceRepaint() {
            const body = document.body;
            const originalTransform = body.style.transform;
            body.style.transform = 'translateZ(0)';
            body.offsetHeight;
            body.style.transform = originalTransform;
            document.querySelectorAll('.alert-layer').forEach(el => {
                if (!el.isConnected) return;
                const orig = el.style.opacity;
                el.style.opacity = '0.99';
                el.offsetHeight;
                el.style.opacity = orig;
            });
        },
        validateCanvasContexts() {
            let invalid = 0;
            overlayState.canvasContexts.forEach((ctx, id) => {
                try {
                    const canvas = document.getElementById(id);
                    if (!canvas || canvas.getContext('2d') !== ctx) {
                        overlayState.canvasContexts.delete(id);
                        invalid++;
                    }
                } catch(e) {
                    overlayState.canvasContexts.delete(id);
                    invalid++;
                }
            });
            if (invalid) DebugEngine.log('OBS', `Cleaned ${invalid} stale canvas contexts`);
        }
    };

    // ============================================================
    // 17. SAFE CLEANUP ORCHESTRATOR (v3: event ordering correcto)
    // ============================================================
    const SafeCleanupOrchestrator = {
        phases: [
            { name: 'async', fn: () => AsyncTaskRegistry.cancelAll() },
            { name: 'timeouts', fn: () => clearAllTimeouts() },
            { name: 'animations', fn: () => cancelAllAnimations() },
            { name: 'raf', fn: () => RAFScheduler.clear() },
            { name: 'intervals', fn: () => IntervalEngine.clearAll() },
            { name: 'polling', fn: () => { overlayState.pollingActive = false; if (overlayState.pollTimerId) { clearTimeout(overlayState.pollTimerId); overlayState.pollTimerId = null; } } },
            { name: 'health', fn: () => HealthEngine.stop() },
            { name: 'freeze', fn: () => FreezeDetection.stop() },
            { name: 'metrics', fn: () => ResourceMetrics.stop() },
            { name: 'engines', fn: () => EngineRegistry.destroyAll() },
            { name: 'dom', fn: () => hideAllLayers() }
        ],
        destroyOverlayRuntime() {
            DebugEngine.log('CLEANUP', 'Starting ordered shutdown...');
            InternalEventBus.emit('overlay:destroy:before', null);
            for (let phase of this.phases) {
                try {
                    phase.fn();
                    DebugEngine.log('CLEANUP', `Phase ${phase.name} complete`);
                } catch(e) {
                    DebugEngine.error('CLEANUP', `Phase ${phase.name} failed:`, e);
                }
            }
            InternalEventBus.emit('overlay:destroyed', null);
        }
    };

    // ============================================================
    // 18. ENGINE REGISTRY (v3: valida duplicados)
    // ============================================================
    const EngineRegistry = {
        engines: new Map(),
        register(name, engine) {
            if (this.engines.has(name)) {
                DebugEngine.warn('REGISTRY', `Engine ${name} already registered, destroying old instance`);
                this.destroy(name);
            }
            this.engines.set(name, engine);
            if (engine && typeof engine.init === 'function') {
                try { engine.init(); } catch(e) { DebugEngine.error('REGISTRY', `Init failed for ${name}:`, e); }
            }
            InternalEventBus.emit('engine:registered', { name });
            return engine;
        },
        get(name) { return this.engines.get(name); },
        has(name) { return this.engines.has(name); },
        destroy(name) {
            const engine = this.engines.get(name);
            if (engine && typeof engine.destroy === 'function') {
                try { engine.destroy(); } catch(e) {}
            }
            this.engines.delete(name);
            InternalEventBus.emit('engine:destroyed', { name });
        },
        destroyAll() {
            this.engines.forEach((engine, name) => this.destroy(name));
        },
        list() { return Array.from(this.engines.keys()); }
    };

    // ============================================================
    // 19. FRAME BUDGET ENGINE (task chunking + idle callbacks)
    // ============================================================
    const FrameBudgetEngine = {
        tasks: [],
        budgetMs: 16,
        schedule(workFn, options = {}) {
            const { priority = 0, label = '' } = options;
            this.tasks.push({ fn: workFn, priority, label });
            this.tasks.sort((a, b) => b.priority - a.priority);
            if (!this._scheduled) this._run();
        },
        _scheduled: false,
        _run() {
            this._scheduled = true;
            requestIdleCallback ? requestIdleCallback((deadline) => this._process(deadline), { timeout: 50 }) : setTimeout(() => this._process({ timeRemaining: () => 16, didTimeout: false }), 0);
        },
        _process(deadline) {
            const start = performance.now();
            while (this.tasks.length && (deadline.timeRemaining() > 0 || deadline.didTimeout)) {
                const task = this.tasks.shift();
                try {
                    task.fn();
                } catch(e) {
                    DebugEngine.error('BUDGET', `Task ${task.label} error:`, e);
                }
                if (performance.now() - start > this.budgetMs) break;
            }
            if (this.tasks.length) {
                this._run();
            } else {
                this._scheduled = false;
            }
        },
        clear() {
            this.tasks = [];
            this._scheduled = false;
        }
    };

    // ============================================================
    // 20. RENDER DIFF ENGINE (partial DOM updates)
    // ============================================================
    const RenderDiffEngine = {
        diffText(el, newText) {
            if (!el || !el.isConnected) return false;
            if (el.textContent !== newText) {
                el.textContent = newText;
                return true;
            }
            return false;
        },
        diffHtml(el, newHtml) {
            if (!el || !el.isConnected) return false;
            if (el.innerHTML !== newHtml) {
                el.innerHTML = newHtml;
                return true;
            }
            return false;
        },
        diffSrc(el, newSrc) {
            if (!el || !el.isConnected) return false;
            if (el.src !== newSrc) {
                el.src = newSrc;
                return true;
            }
            return false;
        },
        diffClass(el, className, shouldHave) {
            if (!el || !el.isConnected) return false;
            const has = el.classList.contains(className);
            if (has !== shouldHave) {
                if (shouldHave) el.classList.add(className);
                else el.classList.remove(className);
                return true;
            }
            return false;
        },
        diffOpacity(el, newOpacity) {
            if (!el || !el.isConnected) return false;
            const current = parseFloat(el.style.opacity) || 0;
            if (Math.abs(current - newOpacity) > 0.01) {
                el.style.opacity = newOpacity;
                return true;
            }
            return false;
        }
    };

    // ============================================================
    // 21. DECLARATIVE SEQUENCE GRAPH (timeline engine preparado)
    // ============================================================
    const SequenceGraphEngine = {
        nodes: new Map(),
        edges: [],
        registerNode(id, config) {
            this.nodes.set(id, {
                id,
                fn: config.fn,
                duration: config.duration || 0,
                condition: config.condition || (() => true),
                onSkip: config.onSkip || null,
                priority: config.priority || 0
            });
        },
        registerEdge(from, to) {
            this.edges.push({ from, to });
        },
        async execute(startNodeId, token) {
            const visited = new Set();
            const queue = [startNodeId];
            while (queue.length) {
                const nodeId = queue.shift();
                if (visited.has(nodeId)) continue;
                visited.add(nodeId);
                const node = this.nodes.get(nodeId);
                if (!node) continue;
                if (!isCurrentSequence(token)) {
                    DebugEngine.log('SEQUENCE', `Sequence ${token} aborted at node ${nodeId}`);
                    return;
                }
                const shouldRun = await Promise.resolve(node.condition());
                if (!shouldRun) {
                    if (node.onSkip) await Promise.resolve(node.onSkip());
                    continue;
                }
                await Promise.resolve(node.fn());
                if (node.duration > 0) await delay(node.duration);
                // Find next nodes
                const nextNodes = this.edges
                    .filter(e => e.from === nodeId)
                    .map(e => e.to)
                    .sort((a, b) => (this.nodes.get(b)?.priority || 0) - (this.nodes.get(a)?.priority || 0));
                queue.push(...nextNodes);
            }
        },
        clear() {
            this.nodes.clear();
            this.edges = [];
        }
    };

    // ============================================================
    // 22. HEALTH ENGINE (v3: usa IntervalEngine)
    // ============================================================
    const HealthEngine = {
        lastPollTime: 0,
        lastRenderTime: 0,
        intervalId: null,
        recoveryState: {
            lastRecoveryTime: 0,
            recoveryCount: 0,
            maxRecoveries: 5,
            cooldownMs: 30000,
            locked: false
        },
        attemptRecovery(type, action) {
            const now = Date.now();
            const state = this.recoveryState;
            if (state.locked) return false;
            if (now - state.lastRecoveryTime < state.cooldownMs) {
                DebugEngine.warn('HEALTH', `Recovery for ${type} blocked by cooldown`);
                return false;
            }
            if (state.recoveryCount >= state.maxRecoveries) {
                DebugEngine.error('HEALTH', `Max recoveries (${state.maxRecoveries}) reached for ${type}`);
                return false;
            }
            state.locked = true;
            state.lastRecoveryTime = now;
            state.recoveryCount++;
            try {
                action();
                DebugEngine.log('HEALTH', `Recovery executed for ${type} (#${state.recoveryCount})`);
                InternalEventBus.emit('health:recovery', { type, count: state.recoveryCount });
            } catch(e) {
                DebugEngine.error('HEALTH', `Recovery failed for ${type}:`, e);
            } finally {
                state.locked = false;
            }
            return true;
        },
        start() {
            if (this.intervalId) return;
            this.intervalId = IntervalEngine.set(() => {
                const now = Date.now();
                if (overlayState.pollingActive && (now - this.lastPollTime > 15000)) {
                    this.attemptRecovery('polling', () => {
                        DebugEngine.warn('HEALTH', 'Polling stuck detected, restarting...');
                        restartPolling();
                    });
                }
                if (overlayState.sequenceActive && (now - this.lastRenderTime > 60000)) {
                    this.attemptRecovery('render', () => {
                        DebugEngine.warn('HEALTH', 'Render freeze detected, cleaning up...');
                        hideAllLayers();
                        overlayState.sequenceActive = false;
                    });
                }
                if (overlayState.logoLoadedCache) overlayState.logoLoadedCache.prune();
                if (overlayState.weaponDataCache) overlayState.weaponDataCache.prune();
                PreloadEngine.cache.prune();
                OBSRecovery.validateCanvasContexts();
            }, 5000);
        },
        markPoll() { this.lastPollTime = Date.now(); },
        markRender() { this.lastRenderTime = Date.now(); },
        stop() {
            if (this.intervalId) { IntervalEngine.clear(this.intervalId); this.intervalId = null; }
        }
    };

    // ============================================================
    // 23. TRANSITION ENGINE (v3: awaitTransitionEnd real en showLayer)
    // ============================================================
    const TransitionEngine = {
        locks: {},
        queues: {},
        priorities: { low: 0, normal: 1, high: 2, emergency: 3 },
        async run(layer, fn, options = {}) {
            const { priority = 'normal', awaitEnd = false } = options;
            const prioValue = this.priorities[priority] || 1;
            if (!this.queues[layer]) this.queues[layer] = [];
            const entry = { fn, priority: prioValue, awaitEnd };
            const idx = this.queues[layer].findIndex(e => e.priority < prioValue);
            if (idx === -1) this.queues[layer].push(entry);
            else this.queues[layer].splice(idx, 0, entry);
            if (this.locks[layer]) return;
            this.locks[layer] = true;
            while (this.queues[layer].length) {
                const next = this.queues[layer].shift();
                try {
                    const result = await Promise.resolve(next.fn());
                    if (next.awaitEnd && result && typeof result.then === 'function') {
                        await result;
                    }
                } catch(e) {
                    DebugEngine.error('TRANSITION', `Layer ${layer} transition error:`, e);
                }
            }
            this.locks[layer] = false;
            InternalEventBus.emit('transition:complete', { layer });
        },
        flush(layer) {
            if (this.queues[layer]) {
                const count = this.queues[layer].length;
                this.queues[layer] = [];
                DebugEngine.log('TRANSITION', `Flushed ${count} pending transitions for ${layer}`);
            }
        },
        flushAll() {
            Object.keys(this.queues).forEach(layer => this.flush(layer));
        }
    };

    // awaitTransitionEnd helper
    function awaitTransitionEnd(element, property = 'opacity', timeoutMs = 2000) {
        return new Promise((resolve) => {
            if (!element || !element.isConnected) { resolve(); return; }
            let resolved = false;
            const onEnd = (e) => {
                if (e.propertyName !== property) return;
                resolved = true;
                element.removeEventListener('transitionend', onEnd);
                resolve();
            };
            element.addEventListener('transitionend', onEnd);
            addTimeout(() => {
                if (!resolved) {
                    element.removeEventListener('transitionend', onEnd);
                    resolve();
                }
            }, timeoutMs);
        });
    }

    // ============================================================
    // 24. NETWORK ENGINE (v3: separa cleanup de abort)
    // ============================================================
    function createAbortableFetch(url, options = {}, timeoutMs = 3000) {
        const controller = new AbortController();
        let aborted = false;
        let completed = false;
        const safeAbort = (reason) => {
            if (aborted || completed) return;
            aborted = true;
            try { controller.abort(reason); } catch(e) {}
        };
        const timeoutId = addTimeout(() => safeAbort('timeout'), timeoutMs);
        const taskId = AsyncTaskRegistry.register(() => safeAbort('registry-cancel'), { type: 'fetch', label: url });
        return fetch(url, { ...options, signal: controller.signal }).then(response => {
            completed = true;
            removeTimeout(timeoutId);
            AsyncTaskRegistry.complete(taskId);
            return response;
        }).catch(err => {
            completed = true;
            removeTimeout(timeoutId);
            AsyncTaskRegistry.complete(taskId);
            throw err;
        });
    }

    async function fetchSnapshot() {
        if (overlayState.fetchInProgress) {
            if (Date.now() - overlayState.fetchStartTime > 10000) {
                overlayState.fetchInProgress = false;
                overlayState.fetchStartTime = 0;
                DebugEngine.warn('NETWORK', 'Stale fetch detected, hard reset');
            } else {
                DebugEngine.log('NETWORK', 'Fetch skipped, already in progress');
                return null;
            }
        }
        overlayState.fetchInProgress = true;
        overlayState.fetchStartTime = Date.now();
        const perfStart = PerfEngine.start('fetchSnapshot');
        try {
            const response = await createAbortableFetch(overlayState.snapshotEndpoint, {}, 3000);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const text = await response.text();
            let data;
            try { data = JSON.parse(text); } catch(e) { throw new Error('Invalid JSON'); }
            overlayState.pollErrorCount = 0;
            PerfEngine.end('fetchSnapshot', 'NETWORK');
            return data;
        } catch (err) {
            DebugEngine.warn('NETWORK', 'Snapshot fetch failed:', err.message);
            overlayState.pollErrorCount++;
            return null;
        } finally {
            overlayState.fetchInProgress = false;
            overlayState.fetchStartTime = 0;
        }
    }

    async function fetchWithLimit(items, limit, worker) {
        const results = [];
        const queue = [...items];
        async function doWork() {
            while (queue.length) {
                const item = queue.shift();
                results.push(await worker(item));
            }
        }
        const workers = Array(Math.min(limit, items.length || 1)).fill().map(() => doWork());
        await Promise.all(workers);
        return results;
    }

    async function fetchWeaponDataForGame(players, gameId) {
        if (!gameId) return new Map();
        const cached = overlayState.weaponDataCache.get(gameId);
        if (cached) return cached;
        if (overlayState.pendingWeaponFetches.has(gameId)) {
            return overlayState.pendingWeaponFetches.get(gameId);
        }
        const promise = (async () => {
            const cacheMap = new Map();
            const uniqueUids = [...new Set(players.map(p => p.uId).filter(Boolean))];
            const limit = 4;
            await fetchWithLimit(uniqueUids, limit, async (uid) => {
                try {
                    const url = `${overlayState.apiBase}/getplayerweapondetailinfo?uid=${encodeURIComponent(uid)}`;
                    const res = await createAbortableFetch(url, {}, 5000);
                    if (!res.ok) return;
                    const data = await res.json();
                    let playerEntry;
                    const wi = data?.playerweapondetailinfo;
                    if (Array.isArray(wi)) playerEntry = wi.find(p => String(p.PlayerID) === String(uid));
                    else if (wi && typeof wi === 'object') playerEntry = wi[uid] || wi[String(uid)];
                    if (playerEntry && Array.isArray(playerEntry.WeaponResult)) {
                        cacheMap.set(uid, playerEntry.WeaponResult);
                    }
                } catch(e) { /* ignore */ }
            });
            overlayState.weaponDataCache.set(gameId, cacheMap);
            overlayState.pendingWeaponFetches.delete(gameId);
            return cacheMap;
        })();
        overlayState.pendingWeaponFetches.set(gameId, promise);
        return promise;
    }

    // ============================================================
    // 25. TEAM RESOLVER ENGINE
    // ============================================================
    async function loadEventConfig() {
        const possiblePaths = [
            './event_config.json',
            `/eventos/${SAFE_EVENT_NAME}/event_config.json`
        ];

        for (const configUrl of possiblePaths) {
            try {
                const res = await createAbortableFetch(configUrl, {}, 5000);
                if (!res.ok) continue;

                const config = await res.json();
                overlayState.eventConfig = config;
                overlayState.teamIdToKeyMap.clear();
                overlayState.teamIdToNameMap.clear();

                if (config.teams && Array.isArray(config.teams)) {
                    config.teams.forEach(team => {
                        const numericTeamId = Number(team.teamId);
                        if (isNaN(numericTeamId) || numericTeamId <= 0) return;

                        const teamKey =
                            team.teamKey ||
                            team.teamManagerId ||
                            team.logoKey ||
                            (/^T-\d{4}$/i.test(String(team.teamId || ''))
                                ? String(team.teamId)
                                : `T-${String(numericTeamId).padStart(4, '0')}`);

                        const teamName = team.teamName || team.name || `Equipo ${numericTeamId}`;

                        overlayState.teamIdToKeyMap.set(numericTeamId, teamKey);
                        overlayState.teamIdToKeyMap.set(String(numericTeamId), teamKey);

                        overlayState.teamIdToNameMap.set(numericTeamId, teamName);
                        overlayState.teamIdToNameMap.set(String(numericTeamId), teamName);
                    });
                }

                DebugEngine.log('NETWORK', 'Event config loaded:', configUrl);
                return;
            } catch (err) {
                DebugEngine.warn('NETWORK', 'Failed to load event_config.json from:', configUrl, err);
            }
        }

        overlayState.eventConfig = { teams: [] };
    }

    async function resolveTeamLogoUrl(teamId) {
        const numericTeamId = Number(teamId);

        const teamKey =
            (!isNaN(numericTeamId)
                ? overlayState.teamIdToKeyMap.get(numericTeamId) || overlayState.teamIdToKeyMap.get(String(numericTeamId))
                : null) ||
            overlayState.teamIdToKeyMap.get(String(teamId)) ||
            `T-${String(!isNaN(numericTeamId) ? numericTeamId : teamId).padStart(4, '0')}`;

        let resolvedUrl = null;

        if (typeof resolveTeamKeyViaResolver === 'function') {
            try {
                resolvedUrl = await resolveTeamKeyViaResolver(teamId, teamKey);
            } catch(e) {
                DebugEngine.warn('RENDER', 'Team resolver error:', e);
            }
        }

        if (!resolvedUrl) resolvedUrl = `/logos/${teamKey}.png`;

        const cached = overlayState.logoLoadedCache.get(resolvedUrl);
        if (cached === false) return overlayState.defaultLogo;
        if (cached === true) return resolvedUrl;

        const img = new Image();
        const finalUrl = resolvedUrl;

        await new Promise((resolve) => {
            img.onload = () => {
                overlayState.logoLoadedCache.set(finalUrl, true);
                resolve();
            };
            img.onerror = () => {
                overlayState.logoLoadedCache.set(finalUrl, false);
                resolve();
            };
            img.src = finalUrl;
        });

        return overlayState.logoLoadedCache.get(resolvedUrl) === false
            ? overlayState.defaultLogo
            : resolvedUrl;
    }

    // ============================================================
    // 26. RADAR ENGINE
    // ============================================================
    const RadarCache = {
        cache: new Map(),
        getKey(canvasId, labels) {
            return `${canvasId}_${labels.join(',')}`;
        },
        getBackgroundCanvas(canvasId, width, height, labels, drawFn) {
            const key = this.getKey(canvasId, labels);
            const existing = this.cache.get(key);
            if (existing && existing.width === width && existing.height === height) {
                return existing.offscreen;
            }
            const offscreen = document.createElement('canvas');
            offscreen.width = width;
            offscreen.height = height;
            const ctx = offscreen.getContext('2d');
            if (ctx) drawFn(ctx, width, height);
            this.cache.set(key, { offscreen, width, height });
            return offscreen;
        },
        clear() {
            this.cache.clear();
        }
    };

    function getCanvasContext(canvasId) {
        if (overlayState.canvasContexts.has(canvasId)) {
            return overlayState.canvasContexts.get(canvasId);
        }
        const canvas = document.getElementById(canvasId);
        if (!canvas) return null;
        const ctx = canvas.getContext('2d');
        overlayState.canvasContexts.set(canvasId, ctx);
        return ctx;
    }

    function drawRadarChart(canvasId, stats) {
        const canvas = document.getElementById(canvasId);
        if (!canvas || !stats || Object.keys(stats).length === 0) {
            if (canvas) canvas.style.opacity = 0;
            return;
        }
        canvas.style.opacity = 1;
        const ctx = getCanvasContext(canvasId);
        if (!ctx) return;
        const w = canvas.width, h = canvas.height;
        ctx.clearRect(0, 0, w, h);
        const centerX = w / 2;
        const centerY = h / 2;
        const radius = Math.min(centerX, centerY) - 80;
        const statLabels = ['Tiros', 'Impactos', 'Precisión', 'Cabeza', 'Cuerpo', 'Manos', 'Pies', 'Extremidades'];
        const statKeys = ['TotalShots', 'TotalHits', 'Accuracy', 'HeadHits', 'BodyHits', 'HandHits', 'FootHits', 'LimbsHits'];
        const maxValues = {};
        statKeys.forEach(k => { maxValues[k] = (stats[k] || 0) + 50; });
        const normalized = statKeys.map(k => Math.min((stats[k] || 0) / maxValues[k], 1));

        const drawStatic = (sCtx, sw, sh) => {
            const sCenterX = sw / 2;
            const sCenterY = sh / 2;
            const sRadius = Math.min(sCenterX, sCenterY) - 80;
            const sAngleStep = (2 * Math.PI) / statLabels.length;
            sCtx.strokeStyle = 'rgba(255,255,255,0.3)';
            for (let i = 1; i <= 4; i++) {
                sCtx.beginPath();
                sCtx.arc(sCenterX, sCenterY, (sRadius / 4) * i, 0, 2 * Math.PI);
                sCtx.stroke();
            }
            sCtx.strokeStyle = 'rgba(255,255,255,0.4)';
            for (let i = 0; i < statLabels.length; i++) {
                let a = sAngleStep * i - Math.PI / 2;
                let x = sCenterX + Math.cos(a) * sRadius;
                let y = sCenterY + Math.sin(a) * sRadius;
                sCtx.beginPath();
                sCtx.moveTo(sCenterX, sCenterY);
                sCtx.lineTo(x, y);
                sCtx.stroke();
            }
            sCtx.fillStyle = 'white';
            sCtx.font = 'bold 18px Roboto';
            statLabels.forEach((label, i) => {
                let a = sAngleStep * i - Math.PI / 2;
                let lx = sCenterX + Math.cos(a) * (sRadius + 35);
                let ly = sCenterY + Math.sin(a) * (sRadius + 35);
                sCtx.strokeStyle = 'rgba(0,0,0,0.8)';
                sCtx.lineWidth = 4;
                sCtx.strokeText(label, lx, ly);
                sCtx.fillStyle = 'white';
                sCtx.fillText(label, lx, ly);
            });
        };

        const offscreen = RadarCache.getBackgroundCanvas(canvasId, w, h, statLabels, drawStatic);
        ctx.drawImage(offscreen, 0, 0);

        const angleStep = (2 * Math.PI) / statLabels.length;
        ctx.fillStyle = 'rgba(188,94,251,0.45)';
        ctx.strokeStyle = 'var(--accent-2)';
        ctx.lineWidth = 3;
        ctx.shadowColor = 'var(--accent-2)';
        ctx.shadowBlur = 15;
        ctx.beginPath();
        normalized.forEach((v, i) => {
            let a = angleStep * i - Math.PI / 2;
            let x = centerX + Math.cos(a) * (v * radius);
            let y = centerY + Math.sin(a) * (v * radius);
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        });
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
        ctx.shadowBlur = 0;

        ctx.fillStyle = 'white';
        normalized.forEach((v, i) => {
            let a = angleStep * i - Math.PI / 2;
            let x = centerX + Math.cos(a) * (v * radius);
            let y = centerY + Math.sin(a) * (v * radius);
            ctx.beginPath();
            ctx.arc(x, y, 6, 0, 2 * Math.PI);
            ctx.fill();
            let val = statKeys[i] === 'Accuracy' ? (stats[statKeys[i]] || 0).toFixed(1) + '%' : Math.floor(stats[statKeys[i]] || 0);
            let tx = centerX + Math.cos(a) * (v * radius + 30);
            let ty = centerY + Math.sin(a) * (v * radius + 30);
            ctx.strokeStyle = 'rgba(0,0,0,0.8)';
            ctx.lineWidth = 4;
            ctx.strokeText(val, tx, ty);
            ctx.fillStyle = 'white';
            ctx.fillText(val, tx, ty);
        });
    }

    // ============================================================
    // 27. WEAPON ENGINE
    // ============================================================
    function processWeaponData(weaponData, targetCanvasId, targetInfoId, isTeam) {
        if (!weaponData || !weaponData.length) {
            drawRadarChart(targetCanvasId, {});
            safeSetOpacity(targetInfoId, 0);
            return;
        }
        const totals = { TotalShots: 0, TotalHits: 0, HeadHits: 0, BodyHits: 0, HandHits: 0, FootHits: 0, LimbsHits: 0 };
        let weaponKillMap = new Map();
        weaponData.forEach(w => {
            if (!w || !w.WeaponId) return;

            totals.HandHits += w.HandShootCount || 0;
            totals.FootHits += w.FootShootCount || 0;
            totals.LimbsHits += w.LimbsShootCount || 0;
            let wname = WEAPON_NAMES[w.WeaponId];
            if (wname) weaponKillMap.set(wname, (weaponKillMap.get(wname) || 0) + (w.KillCount || 0));
        });
        totals.Accuracy = totals.TotalShots > 0 ? (totals.TotalHits / totals.TotalShots) * 100 : 0;

        let favWeapon = null, maxKills = 0;

    function getPositionPoints(rank) {
        const pointsTable = { 1: 10, 2: 8, 3: 6, 4: 5, 5: 4, 6: 3, 7: 2, 8: 1, 9: 1, 10: 1 };
        return pointsTable[rank] || 0;
    }

    function getNormalizedScoring() {
        let raw = null;
        if (window.OverlayConfig && typeof window.OverlayConfig.get === 'function') {
            try { raw = window.OverlayConfig.get().scoring; } catch (e) { /* ignore */ }
        }
        if (!raw) {
            raw = overlayState.eventConfig?.scoring || null;
        }
        if (!raw) return null;

        const normalized = {
            positionPoints: null,
            pePerKill: 1,
            bonusEnabled: false,
            bonusPoints: {}
        };

        // Normalize position points (pp, positionPoints, killPoints as object)
        if (raw.pp !== undefined) normalized.positionPoints = raw.pp;
        else if (raw.positionPoints !== undefined) normalized.positionPoints = raw.positionPoints;
        else if (raw.killPoints !== undefined && typeof raw.killPoints === 'object') normalized.positionPoints = raw.killPoints;

        // Normalize PE per kill (pePerKill, or killPoints as number)
        if (raw.pePerKill !== undefined) normalized.pePerKill = Number(raw.pePerKill);
        else if (raw.killPoints !== undefined && typeof raw.killPoints === 'number') normalized.pePerKill = Number(raw.killPoints);

        // Normalize bonus enabled
        normalized.bonusEnabled = raw.bonusEnabled === true;

        // Normalize bonus points mapping both old and new key names
        const bonusSrc = raw.bonus || raw.bonusPoints || {};
        const bonusMap = {
            wwcd: ['wwcd', 'winner', 'win'],
            grenadeKill: ['grenade', 'grenadeKill', 'nade'],
            vehicleKill: ['vehicle', 'vehicleKill', 'car', 'vehiculo'],
            molotovKill: ['molotov', 'molotovKill', 'molly'],
            meleeKill: ['melee', 'meleeKill', 'cuerpo'],
            maxMarchDistance: ['distance', 'maxMarchDistance', 'marchDistance', 'distancia'],
            maxKillDistance: ['killDist', 'maxKillDistance', 'snipe', 'killDistance']
        };
        for (const [dest, keys] of Object.entries(bonusMap)) {
            for (const key of keys) {
                if (bonusSrc[key] !== undefined) {
                    normalized.bonusPoints[dest] = Number(bonusSrc[key]);
                    break;
                }
            }
        }

        normalized.pp = normalized.positionPoints;
        normalized.bonus = normalized.bonusPoints;
        return normalized;
    }

    function getScoringConfig() {
        return getNormalizedScoring();
    }
    function getPositionPointsDynamic(rank) {
        const scoring = getNormalizedScoring();
        if (scoring && scoring.positionPoints) {
            const val = scoring.positionPoints[rank];
            if (val !== undefined) return Number(val);
            if (Array.isArray(scoring.positionPoints) && rank > 0 && rank <= scoring.positionPoints.length) {
                return Number(scoring.positionPoints[rank - 1]);
            }
        }
        return getPositionPoints(rank);
    }
    function getPePerKill() {
        const scoring = getNormalizedScoring();
        return Number(scoring?.pePerKill ?? 1);
    }
    function isBonusEnabled() {
        const scoring = getNormalizedScoring();
        return scoring?.bonusEnabled === true;
    }
    function getBonusPoints() {
        const scoring = getNormalizedScoring();
        return scoring?.bonusPoints || {};
    }
    function resolveTeamKey(teamId) {
        const numericTeamId = Number(teamId);
        if (!isNaN(numericTeamId)) {
            return overlayState.teamIdToKeyMap.get(numericTeamId) ||
                   overlayState.teamIdToKeyMap.get(String(numericTeamId)) ||
                   `T-${String(numericTeamId).padStart(4, '0')}`;
        }
        return overlayState.teamIdToKeyMap.get(String(teamId)) || `T-${String(teamId).padStart(4, '0')}`;
    }

    function groupByTeam(players) {
        const teamsMap = new Map();
        players.forEach(p => {
            if (!p.teamId) return;
            const teamId = p.teamId;
            if (!teamsMap.has(teamId)) {
                teamsMap.set(teamId, {
                    teamId: teamId,
                    teamName: getTeamDisplayName(teamId, p.teamName),
                    players: [],
                    totalKills: 0,
                    totalDamage: 0,
                    bestRank: p.rank || 999,
                    pp: 0,
                    pe: 0,
                    totalPoints: 0,
                    wwcd: false
                });
            }
            const team = teamsMap.get(teamId);
            team.players.push(p);
            team.totalKills += p.killNum || 0;
            team.totalDamage += p.damage || 0;
            if ((p.rank || 999) < team.bestRank) team.bestRank = p.rank || 999;
        });
        teamsMap.forEach(team => {
            const rank = team.bestRank;
            team.pp = getPositionPointsDynamic(rank);
            team.pe = team.totalKills * getPePerKill();
            team.totalPoints = team.pp + team.pe;
            team.wwcd = (rank === 1);
        });
        return Array.from(teamsMap.values());
    }

    function computeTeamStatsWithBonuses(players, killinfo) {
        const teamsMap = new Map();
        players.forEach(p => {
            if (!p.teamId) return;
            const teamId = p.teamId;
            if (!teamsMap.has(teamId)) {
                teamsMap.set(teamId, {
                    teamId: teamId,
                    teamName: getTeamDisplayName(teamId, p.teamName),
                    teamKey: resolveTeamKey(teamId),
                    players: [],
                    totalKills: 0,
                    totalDamage: 0,
                    bestRank: p.rank || 999,
                    pp: 0, pe: 0, bonusTotal: 0, totalPoints: 0, wwcd: false,
                    grenadeKills: 0, vehicleKills: 0, molotovKills: 0,
                    totalMarchDistance: 0, maxKillDistance: 0
                });
            }
            const team = teamsMap.get(teamId);
            team.players.push(p);
            team.totalKills += p.killNum || 0;
            team.totalDamage += p.damage || 0;
            team.grenadeKills += Number(p.killNumByGrenade ?? 0);
            team.vehicleKills += Number(p.killNumInVehicle ?? 0);
            team.totalMarchDistance += Number(p.marchDistance ?? 0);
            team.maxKillDistance = Math.max(team.maxKillDistance, Number(p.maxKillDistance ?? 0));
            if ((p.rank || 999) < team.bestRank) team.bestRank = p.rank || 999;
        });
        const uidToTeam = new Map();
        players.forEach(p => { if (p.uId) uidToTeam.set(String(p.uId), p.teamId); });
        const teamMolotov = new Map();
        if (killinfo && Array.isArray(killinfo)) {
            killinfo.forEach(kill => {
                const causerId = kill.CauserUID;
                if (!causerId) return;
                const teamId = uidToTeam.get(String(causerId));
                if (teamId && Number(kill.ItemID) === 602003 && Number(kill.ResultHealthStatus) === 2) {
                    teamMolotov.set(teamId, (teamMolotov.get(teamId) || 0) + 1);
                }
            });
        }
        const teams = Array.from(teamsMap.values());
        const maxMarch = Math.max(...teams.map(t => t.totalMarchDistance), 0);
        const maxDistance = Math.max(...teams.map(t => t.maxKillDistance), 0);
        const pePerKill = getPePerKill();
        const bonusEnabled = isBonusEnabled();
        const bonusPoints = getBonusPoints();
        const isUniqueMax = (val, max, field) => val === max && max > 0 && teams.filter(t => t[field] === max).length === 1;
        teams.forEach(team => {
            team.molotovKills = teamMolotov.get(team.teamId) || 0;
            team.wwcd = (team.bestRank === 1);
            team.rank = team.bestRank;
            team.position = team.bestRank;
            team.pp = getPositionPointsDynamic(team.bestRank);
            team.pe = team.totalKills * pePerKill;
            let bonusTotal = 0;
            if (bonusEnabled) {
                if (team.wwcd && bonusPoints.wwcd) bonusTotal += Number(bonusPoints.wwcd);
                if (team.grenadeKills > 0 && bonusPoints.grenadeKill) bonusTotal += team.grenadeKills * Number(bonusPoints.grenadeKill);
                if (team.vehicleKills > 0 && bonusPoints.vehicleKill) bonusTotal += team.vehicleKills * Number(bonusPoints.vehicleKill);
                if (team.molotovKills > 0 && bonusPoints.molotovKill) bonusTotal += team.molotovKills * Number(bonusPoints.molotovKill);
                if (isUniqueMax(team.totalMarchDistance, maxMarch, 'totalMarchDistance') && bonusPoints.maxMarchDistance) {
                    bonusTotal += Number(bonusPoints.maxMarchDistance);
                }
                if (isUniqueMax(team.maxKillDistance, maxDistance, 'maxKillDistance') && bonusPoints.maxKillDistance) {
                    bonusTotal += Number(bonusPoints.maxKillDistance);
                }
            }
            team.bonusTotal = bonusTotal;
            team.totalPoints = team.pp + team.pe + bonusTotal;
        });
        return teams;
    }

    function applyScale(element, maxWidth) {
        if (!element || element.scrollWidth <= maxWidth) return;
        const scale = maxWidth / element.scrollWidth;
        const current = element.style.transform || '';
        if (current.includes('scale')) {
            element.style.transform = current.replace(/scale\([^)]+\)/, `scale(${scale})`);
        } else {
            element.style.transform = current ? `${current} scale(${scale})` : `scale(${scale})`;
        }
    }

    function animateNumber(element, start, end, duration) {
        const token = { cancelled: false, rafId: null };
        overlayState.animationTokens.add(token);
        const startTime = performance.now();
        const step = (now) => {
            if (token.cancelled) {
                overlayState.animationTokens.delete(token);
                return true;
            }
            const elapsed = now - startTime;
            const progress = Math.min(elapsed / duration, 1);
            const current = Math.floor(start + (end - start) * progress);
            if (element) element.textContent = current;
            if (progress < 1) {
                return false;
            } else {
                if (element) element.textContent = end;
                overlayState.animationTokens.delete(token);
                return true;
            }
        };
        token.rafId = RAFScheduler.add(step);
        return token;
    }

    function cancelAllAnimations() {
        overlayState.animationTokens.forEach(t => {
            t.cancelled = true;
            if (t.rafId) RAFScheduler.remove(t.rafId);
        });
        overlayState.animationTokens.clear();
    }
