            const fragment = document.createDocumentFragment();
            for (let i = 0; i < group.length; i++) {
                const t = group[i];
                const logoUrl = logos[i];
                const bonusHtml = buildBonusHtml(t, maxGrenade, maxVehicle, maxMolotov, maxMarch, maxDistance, teams);
                const pos = startPos + i;
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${pos}</td>
                    <td><img src="${logoUrl}" onerror="this.src='${overlayState.defaultLogo}'"></td>
                    <td class="team-cell"><div class="team-name">${escapeHtml(t.teamName)}</div>${bonusHtml}</td>
                    <td>${t.pp}</td>
                    <td>${t.pe}</td>
                    <td>${t.totalPoints}</td>`;
                fragment.appendChild(tr);
            }
            return fragment;
        };
        const [frag1, frag2] = await Promise.all([
            buildRows(group1, 1),
            buildRows(group2, 9)
        ]);

        const body1 = safeGetElement('classificationBody1');
        const body2 = safeGetElement('classificationBody2');
        if (body1) {
            body1.innerHTML = '';
            body1.appendChild(frag1);
        }
        if (body2) {
            body2.innerHTML = '';
            body2.appendChild(frag2);
        }
        if (perfStart) PerfEngine.end('populateClassification', 'RENDER');
    }

    function escapeHtml(str) {
        if (!str || typeof str !== 'string') return str;
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    async function showClassification() {
        await populateClassification();
        activateAlerts();
        showLayer('classificationLayer');
        addTimeout(() => hideAllLayers(), SEQUENCE_CONFIG.classificationAutoHide);
    }

    // ============================================================
    // 32. SEQUENCE ENGINE (v3: usa SequenceGraphEngine preparado)
    // ============================================================
    function generateSequenceToken() {
        const token = Date.now().toString(36) + Math.random().toString(36).slice(2);
        overlayState.sequenceToken = token;
        DebugEngine.log('SEQUENCE', 'New sequence token generated:', token);
        return token;
    }

    function isCurrentSequence(token) {
        return overlayState.sequenceToken === token;
    }

    function startFinalSequence(players) {
        if (!players.length) return;
        if (overlayState.sequenceActive) return;
        const token = generateSequenceToken();
        overlayState.sequenceActive = true;
        overlayState.lastPlayerStats = players;
        const teams = computeTeamStatsWithBonuses(players, overlayState.lastKillInfo || []);
        showWinner(teams);
        addTimeout(() => {
            if (!isCurrentSequence(token) || !overlayState.sequenceActive) return;
            showMVP();
            addTimeout(() => {
                if (!isCurrentSequence(token) || !overlayState.sequenceActive) return;
                showMVT();
                addTimeout(() => {
                    if (!isCurrentSequence(token) || !overlayState.sequenceActive) return;
                    showClassification();
                    addTimeout(() => {
                        if (isCurrentSequence(token)) overlayState.sequenceActive = false;
                    }, SEQUENCE_CONFIG.classificationDuration);
                }, SEQUENCE_CONFIG.mvtDuration);
            }, SEQUENCE_CONFIG.mvpDuration);
        }, SEQUENCE_CONFIG.winnerDuration);
    }

    function simpleHash(players) {
        let hash = 0;
        for (let p of players) {
            hash = ((hash << 5) - hash) + (p.uId || 0);
            hash = ((hash << 5) - hash) + (p.teamId || 0);
            hash = ((hash << 5) - hash) + (p.rank || 0);
            hash = ((hash << 5) - hash) + (p.killNum || 0);
            hash = ((hash << 5) - hash) + (p.damage || 0);
            hash |= 0;
        }
        return hash;
    }

    async function stabilizeWinnerAndStartSequence(initialPlayers, retryCount = 0) {
        if (!overlayState.winnerStabilizing) return;
        if (retryCount >= SEQUENCE_CONFIG.winnerStabilizationRetries) {
            overlayState.winnerStabilizing = false;
            startFinalSequence(initialPlayers);
            overlayState.sequenceLocked = false;
            return;
        }
        await delay(SEQUENCE_CONFIG.winnerStabilizationDelay);
        const newData = await fetchSnapshot();
        if (!newData) {
            await stabilizeWinnerAndStartSequence(initialPlayers, retryCount + 1);
            return;
        }
        const newPlayers = (newData.allinfo?.TotalPlayerList || [])
            .filter(p => p.playerName?.trim())
            .map(p => ({
                uId: p.uId, playerName: p.playerName, rank: p.rank || 999,
                killNum: p.killNum || 0, damage: p.damage || 0,
                teamId: p.teamId, teamName: p.teamName,
                teamKey: resolveTeamKey(p.teamId),
                killNumByGrenade: p.killNumByGrenade ?? 0,
                killNumInVehicle: p.killNumInVehicle ?? 0,
                marchDistance: p.marchDistance ?? 0,
                maxKillDistance: p.maxKillDistance ?? 0
            }));
        if (simpleHash(initialPlayers) === simpleHash(newPlayers)) {
            const killinfo = overlayState.pendingMatchMeta?.killinfo || [];
            const results = computeMatchResults(newPlayers, killinfo);
            const exportPayload = {
                ...overlayState.pendingMatchMeta,
                winner: results.winner,
                mvp: results.mvp,
                mvt: results.mvt,
                teams: results.teams,
                players: results.players
            };
            overlayState.lastExportPayload = exportPayload;
            try {
                await exportMatchResultAuto(exportPayload);
            } catch(e) {
                DebugEngine.warn('EXPORT', 'Export failed, sequence continues:', e);
            }
            overlayState.pendingMatchMeta = null;
            overlayState.winnerStabilizing = false;
            overlayState.currentGameId = newData.allinfo?.GameID;
            try {
                if (overlayState.currentGameId) {
                    await fetchWeaponDataForGame(newPlayers, overlayState.currentGameId);
                }
            } catch(e) {
                DebugEngine.warn('WEAPON', 'Weapon preload failed:', e);
            }
            startFinalSequence(newPlayers);
            overlayState.sequenceLocked = false;
        } else {
            await stabilizeWinnerAndStartSequence(newPlayers, retryCount + 1);
        }
    }

    // ============================================================
    // 33. POLLING ENGINE (v3: sequence lock + backoff)
    // ============================================================
    async function fetchData() {
        if (!overlayState.pollingActive) return;
        if (overlayState.sequenceLocked || overlayState.isMatchFinished || overlayState.winnerStabilizing || overlayState.sequenceActive) return;
        HealthEngine.markPoll();
        const data = await fetchSnapshot();
        if (!data) return;
        const allinfo = data.allinfo || {};
        const finishedStartTime = Number(allinfo.FinishedStartTime || 0);
        const gameID = allinfo.GameID;
        if (finishedStartTime > 0 && gameID !== overlayState.lastGameId && !(window.ResultExporter && window.ResultExporter.wasGameAlreadyExported(gameID))) {
            overlayState.sequenceLocked = true;
            overlayState.lastGameId = gameID;
            overlayState.isMatchFinished = true;
            overlayState.pendingMatchMeta = {
                gameId: gameID,
                finishedStartTime: finishedStartTime,
                gameStartTime: allinfo.GameStartTime || null,
                matchNumber: allinfo.MatchNumber || allinfo.MatchID || overlayState.eventConfig?.currentMatch || null,
                killinfo: allinfo.killinfo || allinfo.KillInfo || [],
                rawSnapshot: data
            };
            overlayState.lastKillInfo = allinfo.killinfo || allinfo.KillInfo || [];
            const players = (allinfo.TotalPlayerList || [])
                .filter(p => p.playerName?.trim())
                .map(p => ({
                    uId: p.uId, playerName: p.playerName, rank: p.rank || 999,
                    killNum: p.killNum || 0, damage: p.damage || 0,
                    teamId: p.teamId, teamName: p.teamName, teamKey: resolveTeamKey(p.teamId),
                    killNumByGrenade: p.killNumByGrenade ?? 0,
                    killNumInVehicle: p.killNumInVehicle ?? 0,
                    marchDistance: p.marchDistance ?? 0,
                    maxKillDistance: p.maxKillDistance ?? 0
                }));
            overlayState.winnerStabilizing = true;
            activateAlerts();
            stabilizeWinnerAndStartSequence(players, 0);
        }
    }

    async function pollLoop() {
        if (!overlayState.pollingActive) return;
        if (overlayState.pollTimerId) return;
        try {
            await fetchData();
            overlayState.pollErrorCount = 0;
        } catch (err) {
            overlayState.pollErrorCount++;
            DebugEngine.warn('WATCHDOG', 'Poll cycle error:', err);
        }
        const baseDelay = 2000;
        const backoff = Math.min(overlayState.pollErrorCount * 1000, 6000);
        const delayMs = baseDelay + backoff;
        overlayState.pollTimerId = setTimeout(() => {
            overlayState.pollTimerId = null;
            pollLoop();
        }, delayMs);
    }

    function restartPolling() {
        if (overlayState.pollTimerId) {
            clearTimeout(overlayState.pollTimerId);
            overlayState.pollTimerId = null;
        }
        overlayState.pollingActive = true;
        overlayState.pollErrorCount = 0;
        pollLoop();
    }

    // ============================================================
    // 34. COMMAND ENGINE
    // ============================================================
    const CommandEngine = {
        handlers: new Map(),
        register(cmd, handler) {
            this.handlers.set(cmd, handler);
        },
        execute(cmd) {
            const handler = this.handlers.get(cmd);
            if (!handler) {
                DebugEngine.warn('COMMAND', 'Unknown command:', cmd);
                return;
            }
            EventMiddlewareSystem.execute(cmd, handler).catch(e => {
                DebugEngine.error('COMMAND', `Command ${cmd} error:`, e);
            });
        }
    };

    // ============================================================
    // 35. DEBUG ENGINE (Mock Data & Tools)
    // ============================================================
    function getMockData() {
        return [
            { uId: 5370146473, playerName: "NØK丨SNIPER", rank: 1, killNum: 18, damage: 5970, teamId: 2, teamName: "Team Alpha", killNumByGrenade: 2, killNumInVehicle: 1, marchDistance: 4500, maxKillDistance: 850 },
            { uId: 51313706996, playerName: "MANGO", rank: 2, killNum: 12, damage: 3412, teamId: 5, teamName: "Team Bravo", killNumByGrenade: 0, killNumInVehicle: 0, marchDistance: 3200, maxKillDistance: 420 },
            { uId: 5239928654, playerName: "sirPERCY", rank: 3, killNum: 9, damage: 2590, teamId: 12, teamName: "Team Charlie", killNumByGrenade: 0, killNumInVehicle: 1, marchDistance: 2800, maxKillDistance: 310 }
        ];
    }

    window.debugShowWinner = async () => {
        const players = getMockData();
        overlayState.lastPlayerStats = players;
        const teams = computeTeamStatsWithBonuses(players, overlayState.lastKillInfo || []);
        showWinner(teams);
    };
    window.debugShowMVP = async () => {
        overlayState.lastPlayerStats = getMockData();
        showMVP();
    };
    window.debugShowMVT = async () => {
        overlayState.lastPlayerStats = getMockData();
        showMVT();
    };
    window.debugShowClassification = async () => {
        overlayState.lastPlayerStats = getMockData();
        await showClassification();
    };
    window.debugSimulateMatchEnd = () => {
        hideAllLayers();
        activateAlerts();
        overlayState.winnerStabilizing = true;
        addTimeout(() => {
            overlayState.winnerStabilizing = false;
            startFinalSequence(getMockData());
        }, 2500);
    };
    window.hideAllLayers = hideAllLayers;

    CommandEngine.register('show_winner', window.debugShowWinner);
    CommandEngine.register('show_mvp', window.debugShowMVP);
    CommandEngine.register('show_mvt', window.debugShowMVT);
    CommandEngine.register('show_classification', window.debugShowClassification);
    CommandEngine.register('hide_all', window.hideAllLayers);
    CommandEngine.register('simulate_match_end', window.debugSimulateMatchEnd);

    window.retryExportMatchResult = async function() {
        const payload = overlayState.lastExportPayload;
        if (!payload || !payload.gameId) {
            DebugEngine.warn('EXPORT', 'No hay payload de exportacion valido en memoria');
            console.warn('[EXPORT] No hay resultado de partida valido en memoria para reexportar. Asegurate de que la partida haya terminado y se haya computado al menos una vez.');
            return;
        }
        if (window.ResultExporter && window.ResultExporter.wasGameAlreadyExported(payload.gameId)) {
            DebugEngine.log('EXPORT', 'Reintento bloqueado: GameID ya exportado ' + payload.gameId);
            return;
        }
        DebugEngine.log('EXPORT', 'Reintentando exportacion manual para GameID:', payload.gameId);
        await exportMatchResultAuto(payload);
    };
    CommandEngine.register('export_match_result', window.retryExportMatchResult);

    // ============================================================
    // 36. EVENT ENGINE (OverlayBus)
    // ============================================================
    if (window.OverlayBus && typeof window.OverlayBus.on === 'function') {
        window.OverlayBus.on('command', (cmd) => CommandEngine.execute(cmd));
    }

    // ============================================================
    // 37. WATCHDOG & CLEANUP
    // ============================================================
    function setupWatchdog() {
        window.addEventListener('error', (e) => {
            DebugEngine.error('WATCHDOG', 'Global error:', e.error || e.message);
            if (!overlayState.pollTimerId && overlayState.pollingActive && !overlayState.isDebugMode) {
                restartPolling();
            }
        });
        window.addEventListener('unhandledrejection', (e) => {
            DebugEngine.error('WATCHDOG', 'Unhandled rejection:', e.reason);
            if (!overlayState.pollTimerId && overlayState.pollingActive && !overlayState.isDebugMode) {
                restartPolling();
            }
        });
        window.addEventListener('beforeunload', () => {
            SafeCleanupOrchestrator.destroyOverlayRuntime();
        });
    }


    // ============================================================
    // 37b. AUTO EXPORT ENGINE (match result persistence)
    // ============================================================
    function computeMatchResults(players, killinfo) {
        const teams = computeTeamStatsWithBonuses(players, killinfo);
        const winner = teams.find(t => t.wwcd) || null;
        const mvp = window.ResultSorting && typeof window.ResultSorting.sortPlayersMVP === 'function'
            ? window.ResultSorting.sortPlayersMVP(players)[0] || null
            : [...players].sort((a, b) =>
                (b.killNum || 0) - (a.killNum || 0) ||
                (b.damage || 0) - (a.damage || 0) ||
                (a.rank || 999) - (b.rank || 999)
              )[0] || null;
        const sortedTeams = window.ResultSorting && typeof window.ResultSorting.sortTeamsGeneral === 'function'
            ? window.ResultSorting.sortTeamsGeneral(teams)
            : [...teams].sort((a, b) =>
                (b.totalPoints || 0) - (a.totalPoints || 0) ||
                (b.wwcd ? 1 : 0) - (a.wwcd ? 1 : 0) ||
                (b.pp || 0) - (a.pp || 0) ||
                (b.pe || 0) - (a.pe || 0) ||
                (a.bestRank || 999) - (b.bestRank || 999)
              );
        const mvt = window.ResultSorting && typeof window.ResultSorting.sortTeamsMVT === 'function'
            ? window.ResultSorting.sortTeamsMVT(teams)[0] || null
            : [...teams].sort((a, b) =>
                (b.totalKills || 0) - (a.totalKills || 0) ||
                (b.totalDamage || 0) - (a.totalDamage || 0) ||
                (a.bestRank || 999) - (b.bestRank || 999)
              )[0] || null;
        return { winner, mvp, mvt, teams: sortedTeams, players };
    }

    async function exportMatchResultAuto(meta) {
        if (!window.ResultExporter) return;
        if (!meta || !meta.gameId) return;
        if (window.ResultExporter.wasGameAlreadyExported(meta.gameId)) {
            DebugEngine.log('EXPORT', 'Skip duplicate export for ' + meta.gameId);
            return;
        }
        await window.ResultExporter.exportMatchResult({
            eventName: window.EVENT_NAME,
            safeEventName: window.SAFE_EVENT_NAME,
            matchNumber: meta.matchNumber || undefined,
            gameId: meta.gameId,
            gameStartTime: meta.gameStartTime,
            finishedStartTime: meta.finishedStartTime,
            exportedAt: new Date().toISOString(),
            scoringConfig: getNormalizedScoring() || overlayState.eventConfig?.scoring || null,
            winner: meta.winner,
            mvp: meta.mvp,
            mvt: meta.mvt,
            teams: meta.teams,
            players: meta.players,
            snapshot: meta.rawSnapshot
        });
    }

    // ============================================================
    // 38. INIT
    // ============================================================
    (async function init() {
        await loadEventConfig();
        const urlParams = new URLSearchParams(location.search);
        const debug = urlParams.get('debug') === 'true';
        overlayState.isDebugMode = debug;
        setupWatchdog();
        OBSRecovery.init();
        HealthEngine.start();
        FreezeDetection.start();
        ResourceMetrics.start();

        EngineRegistry.register('HealthEngine', HealthEngine);
        EngineRegistry.register('TransitionEngine', TransitionEngine);
        EngineRegistry.register('PreloadEngine', PreloadEngine);
        EngineRegistry.register('RAFScheduler', RAFScheduler);
        EngineRegistry.register('AsyncTaskRegistry', AsyncTaskRegistry);
        EngineRegistry.register('ResourceMetrics', ResourceMetrics);
        EngineRegistry.register('FreezeDetection', FreezeDetection);
        EngineRegistry.register('OBSRecovery', OBSRecovery);
        EngineRegistry.register('FrameBudgetEngine', FrameBudgetEngine);
        EngineRegistry.register('RenderDiffEngine', RenderDiffEngine);
        EngineRegistry.register('SequenceGraphEngine', SequenceGraphEngine);

        if (debug) {
            safeSetDisplay('debugControls', 'flex');
            const indicator = document.querySelector('.debug-indicator');
            if (indicator) indicator.style.display = 'block';
            overlayState.pollingActive = false;
        } else {
            safeSetDisplay('debugControls', 'none');
            const indicator = document.querySelector('.debug-indicator');
            if (indicator) indicator.style.display = 'none';
            pollLoop();
        }

        InternalEventBus.emit('overlay:ready', { debug });
    })();
})();
</script>
